<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>
</head>
<body 
style="
background-color: #f0f0f0;
font-family: 'Segoe UI',Verdana, Geneva, Tahoma, sans-serif;
padding: 20px;
">
    <h1 style="color: blue; text-align: center; 
    padding: 10px; text-transform: uppercase;">Inline CSS demo</h1>
    <p style="line-height: 1.6; margin-bottom:15px">
        This paragraph is styled using inline CSS. You can change the color, font size, and other styles directly within the HTML element using the style attribute.
    </p>
    <p style="color: blue; font-weight: bolder;">
        This paragraph is bold and blue.
    </p>
    <a style="
    background-color: blue;
     color: #f0f0f0; 
     padding: 10px; 
     text-decoration: none;" 
     href="">
     Click me!</a>
</body>
</html>
