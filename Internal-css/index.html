<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS</title>
    <!--Internal CSS-->
    <style>
        body{
            background-color: #f0f0f0;
            font-family: 'Segoe UI',Verdana, Geneva, Tahoma, sans-serif;
            padding: 20px;
        }
        h1{
            color: blue;
            text-align: center;
            padding: 10px;
            text-transform: uppercase;
        }
        p{
            color: red;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        a{
            background-color: blue;
            color: #f0f0f0;
            padding: 10px;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1 >Inline CSS demo</h1>
    <p>
        This paragraph is styled using inline CSS. You can change the color, font size, and other styles directly within the HTML element using the style attribute.
    </p>
    <p >
        This paragraph is bold and blue.
    </p>
    <a href="">
     Click me!</a>
</body>
</html>
